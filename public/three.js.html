<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Brain Group
const brainGroup = new THREE.Group();
scene.add(brainGroup);

// Create Central "AI Brain" - Glowing Sphere with Wireframe
const brainCore = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 32),
  new THREE.MeshPhongMaterial({
    color: 0x22C55E,
    transparent: true,
    opacity: 0.2,
    emissive: 0x22C55E,
    emissiveIntensity: 0.5
  })
);
brainGroup.add(brainCore);

const brainWire = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1.2, 2),
  new THREE.MeshBasicMaterial({
    color: 0x22C55E,
    wireframe: true,
    transparent: true,
    opacity: 0.3
  })
);
brainGroup.add(brainWire);

// Floating Icons Setup
const iconCount = 6;
const icons = [];
const iconTypes = ['book', 'quiz', 'pdf', 'analytics', 'flashcard', 'sync'];

for (let i = 0; i < iconCount; i++) {
  const angle = (i / iconCount) * Math.PI * 2;
  const radius = 3;
  const group = new THREE.Group();
  
  // Create a simple representative geometry for icons
  const geometry = i % 2 === 0 ? new THREE.BoxGeometry(0.4, 0.5, 0.1) : new THREE.CylinderGeometry(0.2, 0.2, 0.5, 12);
  const material = new THREE.MeshPhongMaterial({ color: 0x22C55E, emissive: 0x22C55E, emissiveIntensity: 0.8 });
  const mesh = new THREE.Mesh(geometry, material);
  
  group.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
  group.add(mesh);
  scene.add(group);
  icons.push({ group, angle, radius, speed: 0.01 + Math.random() * 0.01, offset: Math.random() * 100 });
}

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x22C55E, 2, 10);
pointLight.position.set(2, 3, 4);
scene.add(pointLight);

camera.position.z = 8;

function animate(time) {
  requestAnimationFrame(animate);
  
  brainGroup.rotation.y += 0.005;
  brainGroup.rotation.z += 0.002;
  
  // Pulsing core
  const pulse = 1 + Math.sin(time * 0.002) * 0.1;
  brainCore.scale.set(pulse, pulse, pulse);
  
  icons.forEach((icon, i) => {
    icon.angle += icon.speed;
    icon.group.position.x = Math.cos(icon.angle) * icon.radius;
    icon.group.position.y = Math.sin(icon.angle) * icon.radius + Math.sin(time * 0.002 + icon.offset) * 0.5;
    icon.group.rotation.x += 0.01;
    icon.group.rotation.y += 0.01;
  });
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate(0);

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
