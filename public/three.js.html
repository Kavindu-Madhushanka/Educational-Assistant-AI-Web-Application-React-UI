<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body class="bg-transparent">
    <div
      id="threejs-container-ANIMATION_1"
      style="
        width: 100%;
        height: 100%;
        background: transparent;
        position: absolute;
        top: 0;
        left: 0;
      "
    ></div>

    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
    <script>
      (function () {
        const container = document.getElementById(
          "threejs-container-ANIMATION_1",
        );
        const width = container.clientWidth || window.innerWidth;
        const height = container.clientHeight || window.innerHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
          75,
          width / height,
          0.1,
          1000,
        );

        const renderer = new THREE.WebGLRenderer({
          alpha: true,
          antialias: true,
          powerPreference: "high-performance",
        });

        renderer.setClearColor(0x000000, 0);
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const brainGroup = new THREE.Group();
        scene.add(brainGroup);

        const brainCore = new THREE.Mesh(
          new THREE.SphereGeometry(1, 32, 32),
          new THREE.MeshBasicMaterial({
            color: 0x22c55e,
            transparent: true,
            opacity: 0.25,
          }),
        );
        brainGroup.add(brainCore);

        const brainWire = new THREE.Mesh(
          new THREE.IcosahedronGeometry(1.2, 2),
          new THREE.MeshBasicMaterial({
            color: 0x22c55e,
            wireframe: true,
            transparent: true,
            opacity: 0.4,
          }),
        );
        brainGroup.add(brainWire);

        const iconCount = 6;
        const icons = [];

        for (let i = 0; i < iconCount; i++) {
          const angle = (i / iconCount) * Math.PI * 2;
          const radius = 2.5;
          const group = new THREE.Group();

          const geometry =
            i % 2 === 0
              ? new THREE.BoxGeometry(0.3, 0.4, 0.1)
              : new THREE.CylinderGeometry(0.15, 0.15, 0.4, 12);

          const material = new THREE.MeshBasicMaterial({
            color: 0x2ecc71,
          });
          const mesh = new THREE.Mesh(geometry, material);

          group.position.set(
            Math.cos(angle) * radius,
            Math.sin(angle) * radius,
            0,
          );
          group.add(mesh);
          scene.add(group);
          icons.push({
            group,
            angle,
            radius,
            speed: 0.01 + Math.random() * 0.01,
            offset: Math.random() * 100,
          });
        }

        camera.position.z = 5;

        function animate(time) {
          requestAnimationFrame(animate);

          brainGroup.rotation.y += 0.005;
          brainGroup.rotation.z += 0.002;

          const pulse = 1 + Math.sin(time * 0.002) * 0.08;
          brainCore.scale.set(pulse, pulse, pulse);

          icons.forEach((icon) => {
            icon.angle += icon.speed;
            icon.group.position.x = Math.cos(icon.angle) * icon.radius;
            icon.group.position.y =
              Math.sin(icon.angle) * icon.radius +
              Math.sin(time * 0.002 + icon.offset) * 0.3;
            icon.group.rotation.x += 0.01;
            icon.group.rotation.y += 0.01;
          });

          renderer.render(scene, camera);
        }

        window.addEventListener("resize", () => {
          const w = container.clientWidth || window.innerWidth;
          const h = container.clientHeight || window.innerHeight;
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        });

        animate(0);
      })();
    </script>
  </body>
</html>
